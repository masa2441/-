<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Planner（フランクリン・コヴィー × ニャン丸）</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #ecf0f1;
            --border-color: #bdc3c7;
            --text-color: #2c3e50;
            --header-bg: #ffffff;
            --hover-bg: #d6eaf8;
            --today-bg: #f9e79f;
            --current-month-bg: #eaf2f8;
            --holiday-color: #e74c3c;
            --saturday-color: #3498db;
            --sunday-color: var(--holiday-color);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--secondary-color);
            margin: 0; padding: 15px;
            color: var(--text-color); line-height: 1.6;
        }
        .planner-container { max-width:1200px; margin:0 auto; background:var(--header-bg); border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        .tabs { display:flex; background-color:#f8f9f9; border-bottom:1px solid var(--border-color); padding:0 10px; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
        .tab-button { padding:15px 25px; cursor:pointer; border:none; background:none; font-size:16px; font-weight:500; color:#7f8c8d; position:relative; transition:color 0.3s ease; }
        .tab-button.active { color:var(--primary-color); }
        .tab-button.active::after { content:''; position:absolute; bottom:-1px; left:0; width:100%; height:3px; background-color:var(--primary-color); border-radius:3px 3px 0 0; }
        .tab-button:hover { color:var(--primary-color); }
        .tab-content { display:none; padding:20px; animation:fadeIn 0.5s; }
        .tab-content.active { display:block; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        h2 { color:var(--text-color); border-bottom:2px solid var(--secondary-color); padding-bottom:10px; margin-top:0; }
        .editable { cursor:pointer; padding:5px; min-height:24px; width:100%; box-sizing:border-box; white-space:pre-wrap; word-wrap:break-word; border-radius:4px; }
        .editable:hover { background-color:var(--hover-bg); }
        .editing { background-color:#fff9c4 !important; }
        .edit-input, .edit-textarea { width:100%; padding:5px; border:1px solid var(--primary-color); border-radius:4px; box-sizing:border-box; font-size:inherit; font-family:inherit; line-height:inherit; }
        .edit-textarea { height:120px; resize:vertical; }
        #yearly-content { overflow-y:auto; }
        #yearly .calendar-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px; }
        .year-month-container { border:1px solid var(--border-color); border-radius:6px; padding:10px; transition:box-shadow 0.3s, background-color 0.3s; }
        .year-month-container h3 { text-align:center; margin:0 0 10px 0; font-size:1.1em; }
        .year-month-table { width:100%; text-align:center; border-collapse:collapse; }
        .year-month-table th, .year-month-table td { padding:3px; font-size:0.85em; }
        .year-month-table th { color:#7f8c8d; }
        .year-month-container:hover { box-shadow:0 2px 8px rgba(0,0,0,0.1); cursor:pointer; }
        .year-month-container.current-month { background-color:var(--current-month-bg); border-color:var(--primary-color); }
        .year-month-table .holiday { color:var(--holiday-color); font-weight:bold; }
        #monthly .monthly-layout { display:grid; grid-template-columns:2.5fr 1fr; gap:20px; }
        #monthly-memo-area { border:1px solid var(--border-color); border-radius:6px; padding:15px; }
        #monthly-memo-area h3 { margin-top:0; }
        #monthly-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
        #monthly-header h2 { border:none; margin:0; }
        #monthly-header button { background:none; border:1px solid var(--border-color); border-radius:5px; padding:5px 12px; cursor:pointer; }
        .monthly-calendar-table { width:100%; height:70vh; border-collapse:collapse; table-layout:fixed; }
        .monthly-calendar-table th, .monthly-calendar-table td { border:1px solid var(--border-color); vertical-align:top; padding:5px; }
        .monthly-calendar-table th { padding:10px 5px; background-color:#f8f9f9; }
        .date-header { display:flex; justify-content:space-between; align-items:center; }
        .to-daily-btn { background:none; border:none; cursor:pointer; font-size:1.1em; padding:0 4px; border-radius:4px; }
        .to-daily-btn:hover { background-color:var(--hover-bg); }
        .monthly-calendar-table .date-number { font-size:0.9em; font-weight:500; }
        .monthly-calendar-table .day-cell.today .date-number { background-color:var(--primary-color); color:white; border-radius:50%; display:inline-block; width:24px; height:24px; line-height:24px; text-align:center; }
        .monthly-calendar-table .day-cell.other-month { background-color:#fdfefe; color:#ccc; }
        .monthly-calendar-table .editable { height:calc(100% - 20px); font-size:0.85em; }
        th.saturday, .saturday .date-number, span.saturday { color:var(--saturday-color) !important; }
        th.sunday, .sunday .date-number, span.sunday, .holiday { color:var(--holiday-color) !important; }
        .task-list { list-style:none; padding:0; margin:0; }
        .task-item { display:flex; align-items:center; margin-bottom:8px; padding:8px 4px; border-radius:4px; position:relative; }
        .task-item:hover { background-color:#f4f6f7; }
        .task-item input[type="checkbox"] { margin-right:10px; flex-shrink:0; width:20px; height:20px; }
        .task-item .content { flex-grow:1; min-height:28px; padding:4px; }
        .task-item.completed .content { text-decoration:line-through; color:#95a5a6; }
        .add-task-btn { margin-top:10px; width:100%; padding:12px 8px; background-color:#f1f1f1; border:1px dashed var(--border-color); border-radius:5px; cursor:pointer; color:#7f8c8d; font-size:15px; }
        .add-task-btn:hover { background-color:var(--hover-bg); color:var(--text-color); }
        .task-menu-btn { background:none; border:none; color:#999; cursor:pointer; font-size:1.4em; padding:4px 8px; margin-left:4px; flex-shrink:0; border-radius:4px; }
        .task-menu-btn:hover { background-color:#eee; }
        .task-actions { display:none; position:absolute; right:0; top:100%; background:white; border:1px solid var(--border-color); border-radius:6px; box-shadow:0 3px 12px rgba(0,0,0,0.15); z-index:50; min-width:140px; overflow:hidden; }
        .task-actions.open { display:block; }
        .task-action-item { display:block; width:100%; padding:12px 16px; border:none; background:none; text-align:left; cursor:pointer; font-size:14px; color:var(--text-color); }
        .task-action-item:hover { background-color:#f4f6f7; }
        .task-action-item.danger { color:var(--holiday-color); }
        .task-action-item.danger:hover { background-color:#fdecea; }
        .task-action-item.confirm { background-color:var(--holiday-color); color:white; font-weight:bold; }
        #daily-content { overflow-y:auto; padding-right:15px; }
        .day-container { border-bottom:1px solid #eee; margin-bottom:20px; padding-bottom:20px; }
        .day-container h3 { font-size:1.2em; margin-top:0; }
        .day-container.today { background-color:#fef9e7; border:1px solid var(--today-bg); border-radius:5px; padding:15px; }
        .daily-grid { display:grid; grid-template-columns:1fr 10px 2fr; }
        .daily-tasks, .daily-schedule { border:1px solid var(--border-color); border-radius:5px; padding:10px; }
        .daily-tasks h4, .daily-schedule h4 { margin-top:0; }
        .schedule-item { display:flex; align-items:flex-start; }
        .schedule-time { width:50px; flex-shrink:0; padding-top:5px; font-size:0.9em; color:#7f8c8d; }
        .priority-select { width:50px; margin-right:8px; flex-shrink:0; border:1px solid #ddd; border-radius:4px; font-size:0.9em; }
        .resizer { cursor:col-resize; background-color:var(--secondary-color); transition:background-color 0.2s ease; }
        .resizer:hover { background-color:var(--primary-color); }
        .goals-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(400px, 1fr)); gap:20px; }
        .goal-section { border:1px solid var(--border-color); border-radius:6px; padding:15px; }
        .goal-section.wide { grid-column: 1 / -1; }
        .goal-section h2 { color:var(--primary-color); border-bottom:2px solid var(--secondary-color); padding-bottom:8px; margin-top:0; font-size:1.25em; }
        .goal-section .section-intro { font-size:13px; color:#7f8c8d; margin:0 0 12px 0; line-height:1.5; }
        .goal-section .editable { background-color:#fbfcfd; border:1px dashed #e0e6ed; min-height:30px; margin-top:4px; }
        .goal-section .editable:hover { background-color:var(--hover-bg); }
        .goal-item { margin-bottom:14px; }
        .goal-item strong { display:block; margin-bottom:3px; }
        .mission-box { background:linear-gradient(135deg, #eaf3fa 0%, #f4f9fc 100%); border:2px solid var(--primary-color); border-radius:8px; padding:16px; margin:10px 0; }
        .mission-box .editable { background:white; min-height:80px; border:1px solid #cfdde9; font-size:15px; line-height:1.7; color:#1f4e79; }
        .planner-quote { font-style:italic; color:#7f8c8d; text-align:center; padding:8px; background:#fafbfc; border-left:3px solid var(--primary-color); border-radius:0 4px 4px 0; margin:10px 0; }
        .planner-table { width:100%; border-collapse:collapse; margin-top:8px; font-size:13px; }
        .planner-table th, .planner-table td { border:1px solid var(--border-color); padding:8px 10px; text-align:left; vertical-align:top; }
        .planner-table th { background-color:#d5e8f0; font-weight:bold; color:#1f4e79; }
        .planner-table td.label-cell { background-color:#f2f6f9; font-weight:bold; width:30%; }
        .planner-table .editable { min-height:30px; padding:4px; }
        .role-row td:first-child { background-color:#f8fafc; font-weight:bold; color:#1f4e79; }
        .week-schedule-table { width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
        .week-schedule-table th, .week-schedule-table td { border:1px solid var(--border-color); padding:4px; vertical-align:top; min-width:60px; }
        .week-schedule-table th { background-color:#d5e8f0; text-align:center; font-weight:bold; }
        .week-schedule-table th.weekday-work { background-color:#d5e8f0; }
        .week-schedule-table th.weekday-teach { background-color:#ffe699; }
        .week-schedule-table th.weekday-off { background-color:#c6efce; }
        .week-schedule-table td.time-label { background-color:#f2f2f2; font-weight:bold; text-align:center; min-width:80px; }
        .week-schedule-table .editable { min-height:50px; font-size:11px; }
        .ai-tip { background:#fff8e1; border-left:4px solid #ffc107; padding:10px 14px; border-radius:0 4px 4px 0; margin:8px 0; font-size:13px; }
        .ai-tip strong { color:#b8860b; }
        .warning-box { background:#fdecea; border-left:4px solid #e74c3c; padding:10px 14px; border-radius:0 4px 4px 0; margin:12px 0; font-size:13px; color:#943126; }
        .subnav { display:flex; flex-wrap:wrap; gap:6px; padding:10px; background:#f8f9f9; border-bottom:1px solid var(--border-color); position:sticky; top:48px; z-index:90; }
        .subnav button { padding:6px 12px; border:1px solid var(--border-color); background:white; border-radius:20px; font-size:12px; cursor:pointer; color:var(--text-color); }
        .subnav button:hover { background:var(--hover-bg); border-color:var(--primary-color); }
        .subnav button.active { background:var(--primary-color); color:white; border-color:var(--primary-color); }
        .section-anchor { scroll-margin-top:120px; }
        .task-list-table { width:100%; border-collapse:collapse; }
        .task-list-table th, .task-list-table td { border:1px solid var(--border-color); padding:8px; text-align:left; }
        .task-list-table th { background-color:#f8f9f9; }
        .task-list-table .priority-cell { width:60px; text-align:center; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:25px; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.3); width:90%; max-width:400px; }
        .modal-content h3 { margin-top:0; }
        .modal-content p { margin:10px 0; word-break:break-all; }
        .modal-content input[type="date"] { width:100%; padding:8px; box-sizing:border-box; margin-top:5px; }
        .modal-actions { margin-top:20px; text-align:right; }
        .modal-actions button { margin-left:10px; padding:8px 15px; border-radius:5px; cursor:pointer; border:none; }
        #modal-move-btn { background-color:var(--primary-color); color:white; }
        #modal-copy-btn { background-color:#2ecc71; color:white; }
        #modal-cancel-btn { background-color:#f1f1f1; border:1px solid var(--border-color); color:var(--text-color); }
        .data-mgmt-btn { margin-left:auto !important; font-size:13px !important; color:#27ae60 !important; }
        .data-mgmt-btn:hover { color:var(--primary-color) !important; }
        #data-mgmt-modal .modal-content { max-width:560px; }
        #data-mgmt-modal textarea { width:100%; height:180px; font-family:monospace; font-size:12px; padding:8px; box-sizing:border-box; border:1px solid var(--border-color); border-radius:4px; resize:vertical; }
        #data-mgmt-modal .section { margin-bottom:18px; }
        #data-mgmt-modal .section h4 { margin:0 0 6px 0; }
        #data-mgmt-modal .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
        #data-mgmt-modal .btn-row button { padding:8px 16px; border-radius:5px; cursor:pointer; border:none; font-size:14px; }
        .btn-export { background-color:var(--primary-color); color:white; }
        .btn-import { background-color:#2ecc71; color:white; }
        .btn-merge { background-color:#f39c12; color:white; }
        .btn-close-dm { background-color:#f1f1f1; border:1px solid var(--border-color) !important; color:var(--text-color); }
        #import-status { margin-top:8px; font-size:13px; min-height:20px; }
        @media screen and (max-width: 768px) {
            body { padding:5px; -webkit-text-size-adjust:100%; }
            .planner-container { border-radius:0; box-shadow:none; }
            .tab-button { padding:12px 10px; font-size:14px; flex-grow:1; text-align:center; }
            .tab-content { padding:10px; }
            #yearly-content, #daily-content, .monthly-calendar-table { max-height:none; height:auto; }
            #yearly .calendar-grid { grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:10px; }
            #monthly .monthly-layout { grid-template-columns:1fr; gap:15px; }
            .monthly-calendar-table { font-size:12px; }
            .monthly-calendar-table .editable { min-height:40px; }
            #monthly-header h2 { font-size:1.2em; }
            #monthly-header button { padding:5px 8px; }
            .daily-grid { grid-template-columns:1fr; gap:15px; }
            .resizer { display:none; }
            .goals-grid { grid-template-columns:1fr; gap:15px; }
            .planner-table { font-size:12px; }
            .planner-table th, .planner-table td { padding:5px 6px; }
            .week-schedule-table { font-size:10px; }
            .week-schedule-table th, .week-schedule-table td { padding:2px; min-width:38px; }
            .week-schedule-table td.time-label { min-width:50px; font-size:10px; }
            .subnav { padding:6px; gap:4px; top:42px; }
            .subnav button { padding:5px 8px; font-size:11px; }
            .modal-content { width:95%; }
        }
    </style>
</head>
<body>

<div class="planner-container" id="app">
    <div class="tabs">
        <button class="tab-button active" data-tab="yearly">年間</button>
        <button class="tab-button" data-tab="monthly">月間</button>
        <button class="tab-button" data-tab="daily">デイリー</button>
        <button class="tab-button" data-tab="goals">目標設定</button>
        <button class="tab-button data-mgmt-btn" id="open-data-mgmt">&#x1F4BE; データ</button>
    </div>
    <div id="yearly" class="tab-content active">
        <h2>2026年 年間スケジュール</h2>
        <div id="yearly-content"><div class="calendar-grid" id="yearly-calendar-grid"></div></div>
    </div>
    <div id="monthly" class="tab-content">
        <div class="monthly-layout">
            <div id="monthly-calendar-area">
                <div id="monthly-header">
                    <button id="prev-month-btn">&lt; 前の月</button>
                    <h2 id="monthly-calendar-title"></h2>
                    <button id="next-month-btn">次の月 &gt;</button>
                </div>
                <table class="monthly-calendar-table">
                    <thead><tr id="monthly-calendar-header"></tr></thead>
                    <tbody id="monthly-calendar-body"></tbody>
                </table>
            </div>
            <div id="monthly-memo-area">
                <h3>今月のタスクリスト</h3>
                <ul class="task-list" id="monthly-task-list"></ul>
                <button class="add-task-btn" id="add-monthly-task-btn">+ タスクを追加</button>
            </div>
        </div>
    </div>
    <div id="daily" class="tab-content">
        <h2>デイリースケジュール (2026年)</h2>
        <div id="daily-content"></div>
    </div>
    <div id="goals" class="tab-content"></div>
</div>

<div id="move-task-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3>タスクの移動 / コピー</h3>
        <p>タスク: <strong id="modal-task-content"></strong></p>
        <div>
            <label for="modal-target-date">移動/コピー先の日付:</label>
            <input type="date" id="modal-target-date" name="target-date" min="2026-01-01" max="2026-12-31">
        </div>
        <div class="modal-actions">
            <button id="modal-cancel-btn">キャンセル</button>
            <button id="modal-copy-btn">コピー</button>
            <button id="modal-move-btn">移動</button>
        </div>
    </div>
</div>

<div id="data-mgmt-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3>データ管理</h3>
        <div class="section">
            <h4>エクスポート（書き出し）</h4>
            <p style="font-size:13px;color:#7f8c8d;">現在のデータをJSON形式でコピーできます。</p>
            <div class="btn-row">
                <button class="btn-export" id="btn-export">JSONをコピー</button>
            </div>
            <div id="export-status"></div>
        </div>
        <div class="section">
            <h4>インポート（読み込み）</h4>
            <p style="font-size:13px;color:#7f8c8d;">JSONデータを貼り付けてください。</p>
            <textarea id="import-textarea" placeholder='ここにJSONを貼り付け...'></textarea>
            <div class="btn-row">
                <button class="btn-import" id="btn-import-overwrite">上書きインポート</button>
                <button class="btn-merge" id="btn-import-merge">マージ（追記）</button>
            </div>
            <div id="import-status"></div>
        </div>
        <div style="text-align:right;margin-top:10px;">
            <button class="btn-close-dm" id="btn-close-dm">閉じる</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const YEAR = 2026;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let currentMonth = today.getFullYear() === YEAR ? today.getMonth() : 0;
    let currentYear = YEAR;

    const holidays = {
        '2026-01-01':'元日','2026-01-12':'成人の日','2026-02-11':'建国記念の日','2026-02-23':'天皇誕生日','2026-03-20':'春分の日',
        '2026-04-29':'昭和の日','2026-05-03':'憲法記念日','2026-05-04':'みどりの日','2026-05-05':'こどもの日','2026-05-06':'振替休日',
        '2026-07-20':'海の日','2026-08-11':'山の日','2026-09-21':'敬老の日','2026-09-22':'国民の休日','2026-09-23':'秋分の日',
        '2026-10-12':'スポーツの日','2026-11-03':'文化の日','2026-11-23':'勤労感謝の日'
    };
    const weekdays = ['日','月','火','水','木','金','土'];
    const isHoliday = (date) => holidays[date.toISOString().slice(0,10)];

    // === localStorage版ストレージ ===
    let editablesData = JSON.parse(localStorage.getItem('planner-editables') || '{}');
    let monthlyTasksData = JSON.parse(localStorage.getItem('planner-monthly-tasks') || '{}');
    let dailyTasksData = JSON.parse(localStorage.getItem('planner-daily-tasks') || '{}');

    function saveEditables() { localStorage.setItem('planner-editables', JSON.stringify(editablesData)); }
    function saveMonthlyTasksStorage() { localStorage.setItem('planner-monthly-tasks', JSON.stringify(monthlyTasksData)); }
    function saveDailyTasksStorage() { localStorage.setItem('planner-daily-tasks', JSON.stringify(dailyTasksData)); }

    const getMonthlyTasks = (monthId) => monthlyTasksData[monthId] || [];
    const saveMonthlyTasks = (monthId, tasks) => { monthlyTasksData[monthId] = tasks; saveMonthlyTasksStorage(); };
    const getDailyTasks = (dateId) => dailyTasksData[dateId] || [];
    const saveDailyTasks = (dateId, tasks) => { dailyTasksData[dateId] = tasks; saveDailyTasksStorage(); };

    const openTab = (tabName) => {
        document.querySelectorAll('.tab-content, .tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName)?.classList.add('active');
        document.querySelector(`.tab-button[data-tab="${tabName}"]`)?.classList.add('active');
        if (tabName === 'yearly') highlightAndScrollCurrentMonth();
        if (tabName === 'daily') scrollToToday();
    };

    function init() {
        generateGoalsTab();
        generateYearlyCalendar();
        generateMonthlyCalendar(currentYear, currentMonth);
        generateDailyView();
        setupEventListeners();
        setupResizeListeners();
        setupTaskMoveModal();
        setupDataManagement();
        setupKeyboardNavigation();
        loadAllData();
        openTab('yearly');
    }

    function generateGoalsTab() {
        const g = document.getElementById('goals');

        // サブナビゲーション
        const subnav = `<div class="subnav" id="goals-subnav">
            <button data-anchor="sec-mission">ミッション</button>
            <button data-anchor="sec-values">価値観</button>

        document.addEventListener('click',e=>{if(!e.target.matches('.task-menu-btn')&&!e.target.closest('.task-actions')){document.querySelectorAll('.task-actions.open').forEach(m=>m.classList.remove('open'));}});

    function doImport(mode){

        if(!raw){statusEl.innerHTML='<span style="color:#e74c3c;">JSONを貼り付けてください。</span>';return;}

        if(mode==='overwrite'){editablesData=parsed.editables||{};monthlyTasksData=parsed.monthlyTasks||{};dailyTasksData=parsed.dailyTasks||{};}else{
            if(parsed.editables){for(const[k,v]of Object.entries(parsed.editables)){if(v)editablesData[k]=v;}}
            if(parsed.monthlyTasks){for(const[k,v]of Object.entries(parsed.monthlyTasks)){const ex=monthlyTasksData[k]||[];monthlyTasksData[k]=[...ex,...(v||[]).map(t=>({...t,id:Date.now()+Math.random()*1000|0}))];}}
            if(parsed.dailyTasks){for(const[k,v]of Object.entries(parsed.dailyTasks)){const ex=dailyTasksData[k]||[];dailyTasksData[k]=[...ex,...(v||[]).map(t=>({...t,id:Date.now()+Math.random()*1000|0}))];}}
        }
        saveEditables();saveMonthlyTasksStorage();saveDailyTasksStorage();

        const count=Object.keys(parsed.editables||{}).length+Object.values(parsed.dailyTasks||{}).reduce((s,a)=>s+a.length,0)+Object.values(parsed.monthlyTasks||{}).reduce((s,a)=>s+a.length,0);
        statusEl.innerHTML=`<span style="color:#2ecc71;">${mode==='overwrite'?'上書き':'マージ'}完了！ ${count}件のデータを取り込みました。</span>`;
    }

    function setupKeyboardNavigation(){
        const container=document.querySelector('.planner-container');
        container.addEventListener('keydown',e=>{if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))return;const activeEl=document.activeElement,currentEditable=activeEl.closest('.editable');if(!currentEditable)return;const isTextarea=activeEl.tagName==='TEXTAREA';if(isTextarea&&(e.key==='ArrowUp'||e.key==='ArrowDown'))return;if(isTextarea&&e.key==='ArrowLeft'&&activeEl.selectionStart>0)return;if(isTextarea&&e.key==='ArrowRight'&&activeEl.selectionStart<activeEl.value.length)return;e.preventDefault();const activeTab=container.querySelector('.tab-content.active');if(!activeTab||(activeTab.id!=='daily'&&activeTab.id!=='goals'))return;const allEditables=Array.from(activeTab.querySelectorAll('.editable')).filter(el=>el.offsetParent!==null);if(allEditables.length<=1)return;const cr=currentEditable.getBoundingClientRect();let best=null,minD=Infinity;for(const c of allEditables){if(c===currentEditable)continue;const tr=c.getBoundingClientRect();let d=Infinity,ok=false;switch(e.key){case 'ArrowDown':if(tr.top>cr.top){ok=true;d=(tr.top-cr.top)*1.5+Math.abs(tr.left-cr.left);}break;case 'ArrowUp':if(tr.top<cr.top){ok=true;d=(cr.top-tr.top)*1.5+Math.abs(tr.left-cr.left);}break;case 'ArrowRight':if(tr.left>cr.left&&Math.abs(tr.top-cr.top)<tr.height){ok=true;d=(tr.left-cr.left)+Math.abs(tr.top-cr.top)*2;}break;case 'ArrowLeft':if(tr.left<cr.left&&Math.abs(tr.top-cr.top)<tr.height){ok=true;d=(cr.left-tr.left)+Math.abs(tr.top-cr.top)*2;}break;}if(ok&&d<minD){minD=d;best=c;}}if(!best&&(e.key==='ArrowRight'||e.key==='ArrowLeft')){minD=Infinity;for(const c of allEditables){if(c===currentEditable)continue;const tr=c.getBoundingClientRect();let d=Infinity,ok=false;if(e.key==='ArrowRight'&&tr.left>=cr.left){ok=true;d=Math.hypot(tr.left-cr.right,tr.top-cr.top);}else if(e.key==='ArrowLeft'&&tr.left<=cr.left){ok=true;d=Math.hypot(cr.left-tr.right,tr.top-cr.top);}if(ok&&d<minD){minD=d;best=c;}}}if(best){if(activeEl.matches('.edit-input, .edit-textarea'))activeEl.blur();setTimeout(()=>{best.click();best.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}});
    }

    function handleEdit(target){

        if(monthlyTaskList){const monthId=document.getElementById('add-monthly-task-btn').dataset.monthId;originalText=getMonthlyTasks(monthId).find(t=>t.id==taskId)?.content||'';}else if(dailyTaskList){const dateId=dailyTaskList.id.replace('task-list-','');originalText=getDailyTasks(dateId).find(t=>t.id==taskId)?.content||'';}else{originalText=editablesData[id]||target.innerText;}
        const isTextarea=target.classList.contains('content')||target.dataset.id?.startsWith('value')||target.dataset.id?.startsWith('goal')||target.dataset.id?.startsWith('mission')||target.dataset.id?.startsWith('vision')||target.dataset.id?.startsWith('role-being')||target.dataset.id?.startsWith('role-goal')||target.dataset.id?.startsWith('ms-learn')||target.dataset.id?.startsWith('ms-money')||target.dataset.id?.startsWith('ms-life')||target.dataset.id?.startsWith('yg-goal')||target.dataset.id?.startsWith('q-what')||target.dataset.id?.startsWith('q-week')||target.dataset.id?.startsWith('weekly-')||target.dataset.id?.startsWith('big-rock')||target.dataset.id?.startsWith('weeksch-')||target.dataset.id?.startsWith('eve-')||target.dataset.id?.startsWith('mr-')||target.dataset.id?.startsWith('value-meaning');const inputEl=document.createElement(isTextarea?'textarea':'input');inputEl.className=isTextarea?'edit-textarea':'edit-input';if(!isTextarea)inputEl.type='text';inputEl.value=originalText;target.innerHTML='';target.appendChild(inputEl);target.classList.add('editing');inputEl.focus();
        const finish=()=>{const newText=inputEl.value;if(monthlyTaskList){const monthId=document.getElementById('add-monthly-task-btn').dataset.monthId;let tasks=getMonthlyTasks(monthId),task=tasks.find(t=>t.id==taskId);if(task)task.content=newText;saveMonthlyTasks(monthId,tasks);renderMonthlyTasks(currentYear,currentMonth);}else if(dailyTaskList){const dateId=dailyTaskList.id.replace('task-list-','');let tasks=getDailyTasks(dateId),task=tasks.find(t=>t.id==taskId);if(task)task.content=newText;saveDailyTasks(dateId,tasks);renderDailyTasks(dateId);}else{editablesData[id]=newText;saveEditables();target.innerHTML=newText.replace(/\n/g,'<br>');}target.classList.remove('editing');};
        inputEl.addEventListener('blur',finish,{once:true});inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!isTextarea)inputEl.blur();if(e.key==='Escape'){inputEl.value=originalText;inputEl.blur();}});
    }

    function loadAllData(){document.querySelectorAll('.editable').forEach(el=>{if(!el.closest('.task-item')){const id=el.dataset.id;const saved=editablesData[id];if(saved)el.innerHTML=saved.replace(/\n/g,'<br>');}});}

    const scrollToToday=()=>{const todayId=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;document.getElementById(`day-${todayId}`)?.scrollIntoView({behavior:'smooth',block:'start'});};

    init();
});
</script>
